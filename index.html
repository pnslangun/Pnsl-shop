<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PNSL CLOTHING 💖</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header>
  <h1>💖 ᴘɴꜱʟ ꜱʜᴏᴘ</h1>

  <input type="text" id="search" placeholder="🔍 ค้นหาเสื้อผ้า...">

  <div class="cart-box">
    🛒 ตะกร้า: <span id="cartCount">0</span>
    <button onclick="openCart()">ดูตะกร้า</button>
  </div>

  <div class="banner">🚚 ค่าส่งเริ่มต้น40</div>
</header>

<!-- CATEGORY -->
<div class="categories">
  <button onclick="filterCategory('all')">ทั้งหมด</button>
  <button onclick="filterCategory('shirt')">เสื้อ</button>
  <button onclick="filterCategory('pants')">กางเกง</button>
  <button onclick="filterCategory('dress')">เดรส</button>
</div>

<!-- PRODUCTS -->
<section class="product-grid">

  <div class="product" data-category="shirt">
    <h3>เดรสแฟชั่น</h3>
    <p>119 bath</p>
    <button onclick="addCart('เสื้อยืด Oversize',199)">เพิ่มลงตะกร้า</button>
  </div>

  <div class="product" data-category="shirt">
    <h3>เสื้อครอปชมพู</h3>
    <p>159 บาท</p>
    <button onclick="addCart('เสื้อครอปชมพู',159)">เพิ่มลงตะกร้า</button>
  </div>

  <div class="product" data-category="pants">
    <h3>กางเกงยีนส์</h3>
    <p>299 บาท</p>
    <button onclick="addCart('กางเกงยีนส์',299)">เพิ่มลงตะกร้า</button>
  </div>

  <div class="product" data-category="dress">
    <h3>เดรสสีชมพูหวาน</h3>
    <p>349 บาท</p>
    <button onclick="addCart('เดรสสีชมพูหวาน',349)">เพิ่มลงตะกร้า</button>
  </div>

</section>

<!-- CART -->
<div id="cartModal" class="modal">
  <div class="modal-content">

    <h2>🛒 ตะกร้าสินค้า</h2>
    <div id="cartItems"></div>

    <h3>รวม: <span id="totalPrice">0</span> บาท</h3>

    <button onclick="goToCheckout()">💳 ชำระเงิน</button>
    <button onclick="closeCart()">ปิด</button>

  </div>
</div>

<!-- CHECKOUT -->
<div id="checkoutModal" class="modal">
  <div class="modal-content">

    <h2>💳 ชำระเงิน + อัปโหลดสลิป</h2>

    <img src="https://via.placeholder.com/200" style="width:100%">

    <input type="file" id="slip">

    <h3>📍 ข้อมูลจัดส่ง</h3>
    <input id="name" placeholder="ชื่อ">
    <input id="address" placeholder="ที่อยู่">
    <input id="phone" placeholder="เบอร์โทร">

    <button onclick="confirmOrder()">ยืนยันสั่งซื้อ</button>
    <button onclick="closeCheckout()">ปิด</button>

  </div>
</div>

<!-- TRACKING -->
<div id="trackingBox">
  📦 เลขพัสดุ: <span id="trackingCode">-</span>
</div>

<script src="script.js"></script>
</body>
</html>

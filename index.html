<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pnsl Shop</title>

<style>
body{
margin:0;
font-family:Arial,sans-serif;
background:#f8f8f8;
}

header{
background:#ff4f81;
color:white;
padding:20px;
text-align:center;
font-size:28px;
font-weight:bold;
}

.banner{
padding:40px;
text-align:center;
background:white;
}

.banner h1{
margin:0;
}

.products{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
gap:15px;
padding:20px;
}

.card{
background:white;
border-radius:10px;
padding:15px;
text-align:center;
box-shadow:0 2px 8px rgba(0,0,0,.1);
}

.card img{
width:100%;
border-radius:10px;
}

button{
background:#ff4f81;
color:white;
border:none;
padding:10px 20px;
border-radius:6px;
cursor:pointer;
}

footer{
text-align:center;
padding:20px;
color:#666;
}
</style>

</head>

<body>

<header>
Pnsl Shop
</header>

<div class="banner">
<h1>ยินดีต้อนรับ</h1>
<p>ร้านpanisalaShop เสื้อผ้าแฟชั่นนำเข้าทุกสไตล์</p>
</div>

<div class="products">

<div class="card">
<img src="https://via.placeholder.com/300x350">
<h3>เดรสแฟชั่น</h3>
<p>100 Baht</p>
<button>เพิ่มลงตะกร้า</button>
</div>

<div class="card">
<img src="https://via.placeholder.com/300x350">
<h3>เสื้อ</h3>
<p>59 Baht</p>
<button>เพิ่มลงตะกร้า</button>
</div>

</div>

<footer>
© Pnsl Shop
</footer>

</body>
</html>
